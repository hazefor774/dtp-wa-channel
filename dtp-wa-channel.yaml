# Applied by ops. Secret dtp-wa-env is created separately - never commit tokens.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dtp-wa-channel
  namespace: datipay
  labels: {app.kubernetes.io/name: dtp-wa-channel, app.kubernetes.io/part-of: datipay, dtp.datipay.io/doc-ref: DTP-WA-001}
spec:
  replicas: 1
  selector: {matchLabels: {app.kubernetes.io/name: dtp-wa-channel}}
  template:
    metadata:
      labels: {app.kubernetes.io/name: dtp-wa-channel, app.kubernetes.io/part-of: datipay}
    spec:
      securityContext: {runAsNonRoot: true, runAsUser: 1000, runAsGroup: 1000, fsGroup: 1000, seccompProfile: {type: RuntimeDefault}}
      initContainers:
        - name: clone
          image: alpine/git:2.47.2
          command: ["sh","-c","rm -rf /work/app && git clone --depth 1 https://github.com/hazefor774/dtp-wa-channel.git /work/app && cd /work/app && git log --oneline -1"]
          securityContext: {allowPrivilegeEscalation: false, capabilities: {drop: ["ALL"]}}
          volumeMounts: [{name: work, mountPath: /work}]
          resources: {requests: {cpu: 50m, memory: 64Mi}, limits: {cpu: 500m, memory: 256Mi}}
      containers:
        - name: app
          image: node:22-slim
          workingDir: /work/app
          command: ["node","src/index.js"]
          env: [{name: PORT, value: "8080"}]
          envFrom: [{secretRef: {name: dtp-wa-env}}]
          securityContext: {allowPrivilegeEscalation: false, capabilities: {drop: ["ALL"]}}
          ports: [{containerPort: 8080, name: http}]
          readinessProbe: {httpGet: {path: /health, port: 8080}, initialDelaySeconds: 3, periodSeconds: 10, timeoutSeconds: 5}
          livenessProbe: {httpGet: {path: /health, port: 8080}, periodSeconds: 30, timeoutSeconds: 5}
          resources: {requests: {cpu: 50m, memory: 64Mi}, limits: {cpu: 500m, memory: 256Mi}}
      volumes: [{name: work, emptyDir: {}}]
---
apiVersion: v1
kind: Service
metadata:
  name: dtp-wa-channel
  namespace: datipay
  labels: {app.kubernetes.io/name: dtp-wa-channel, app.kubernetes.io/part-of: datipay}
spec:
  type: ClusterIP
  selector: {app.kubernetes.io/name: dtp-wa-channel}
  ports: [{name: http, port: 80, targetPort: 8080}]
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dtp-wa-channel-ingress
  namespace: datipay
  labels: {app.kubernetes.io/name: dtp-wa-channel, app.kubernetes.io/part-of: datipay}
  annotations: {kubernetes.io/ingress.class: traefik}
spec:
  rules:
    - host: wa.datipay.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: {service: {name: dtp-wa-channel, port: {number: 80}}}
